[project]
name = "pyrobust-predicates"
version = "0.1.0"
description = "Python port of robust-predicates (adaptive-precision orient2d for y-down coordinates)"
requires-python = ">=3.10"
readme = "README.md"
license = "Unlicense"
authors = [{ name = "pyd3 contributors" }]
keywords = ["computational-geometry", "predicates", "robust", "orientation"]
classifiers = [
    "License :: OSI Approved :: The Unlicense (Unlicense)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = [
    "mpmath>=1.3.0",
]

[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pyrobust_predicates"]
