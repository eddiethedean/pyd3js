[project]
name = "pyrobust-predicates"
version = "0.1.0"
description = "Robust orient2d/3d, incircle, insphere predicates (Python port of robust-predicates v3.x)"
requires-python = ">=3.10"
readme = "README.md"
license = "Unlicense"
license-files = ["LICENSE"]
authors = [{ name = "pyd3 contributors" }]
keywords = [
    "computational-geometry",
    "predicates",
    "robust",
    "orientation",
    "orient2d",
    "delaunay",
    "incircle",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: The Unlicense (Unlicense)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Typing :: Typed",
]
dependencies = [
    "mpmath>=1.3.0",
]

[project.urls]
Homepage = "https://github.com/eddiethedean/pyd3js"
Repository = "https://github.com/eddiethedean/pyd3js"
Documentation = "https://github.com/eddiethedean/pyd3js/tree/main/packages/pyrobust-predicates"
Changelog = "https://github.com/eddiethedean/pyd3js/blob/main/packages/pyrobust-predicates/docs/CHANGELOG.md"

[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pyrobust_predicates"]

[tool.hatch.build.targets.sdist]
include = [
    "/README.md",
    "/LICENSE",
    "/docs",
    "/src",
]
