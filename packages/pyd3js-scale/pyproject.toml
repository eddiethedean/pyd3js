[project]
name = "pyd3js-scale"
version = "0.0.0"
description = "Python port of d3-scale"
requires-python = ">=3.10"
readme = "README.md"
authors = [{ name = "pyd3 contributors" }]
dependencies = [
    "pyd3js-array>=0.0.0",
    "pyd3js-format>=0.0.0",
    "pyd3js-interpolate>=0.1.0",
    "pyd3js-time>=0.0.0",
    "pyd3js-time-format>=0.0.0",
]

[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pyd3js_scale"]

[tool.uv.sources]
pyd3js-array = { workspace = true }
pyd3js-format = { workspace = true }
pyd3js-interpolate = { workspace = true }
pyd3js-time = { workspace = true }
pyd3js-time-format = { workspace = true }

