[project]
name = "pyd3js-force"
version = "0.0.0"
description = "Python port of d3-force"
requires-python = ">=3.10"
readme = "README.md"
authors = [{ name = "pyd3 contributors" }]
dependencies = [
    "pyd3js-dispatch>=0.0.0",
    "pyd3js-quadtree>=0.0.0",
    "pyd3js-timer>=0.1.0",
]

[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pyd3js_force"]

[tool.uv.sources]
pyd3js-dispatch = { workspace = true }
pyd3js-quadtree = { workspace = true }
pyd3js-timer = { workspace = true }

