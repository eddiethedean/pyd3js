[project]
name = "pyd3js-interpolate"
version = "0.1.0"
description = "Python port of d3-interpolate"
requires-python = ">=3.10"
readme = "README.md"
authors = [{ name = "pyd3 contributors" }]
license = { file = "LICENSE" }
keywords = ["d3", "d3-interpolate", "interpolation", "animation", "visualization"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: ISC License (ISCL)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
urls = { "Repository" = "https://github.com/eddiethedean/pyd3js", "Homepage" = "https://github.com/eddiethedean/pyd3js/tree/main/packages/pyd3js-interpolate", "Documentation" = "https://github.com/eddiethedean/pyd3js/blob/main/packages/pyd3js-interpolate/docs/USER_GUIDE.md", "Changelog" = "https://github.com/eddiethedean/pyd3js/blob/main/packages/pyd3js-interpolate/docs/CHANGELOG.md" }
dependencies = [
    "pyd3js-color>=0.1.0",
]

[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[tool.hatch.build]
exclude = [
    ".env",
    "upstream/**/.git/**",
    "upstream/**/node_modules/**",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pyd3js_interpolate"]

[tool.pytest.ini_options]
testpaths = ["package_tests"]
addopts = [
    "--cov=pyd3js_interpolate",
    "--cov-report=term-missing",
    "--cov-fail-under=100",
]
markers = [
    "upstream: requires vendored d3-interpolate and npm install (see README)",
]

[tool.uv.sources]
pyd3js-color = { workspace = true }
