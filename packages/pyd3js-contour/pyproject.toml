[project]
name = "pyd3js-contour"
version = "0.0.0"
description = "Python port of d3-contour"
requires-python = ">=3.10"
readme = "README.md"
authors = [{ name = "pyd3 contributors" }]
dependencies = [
    "pyd3js-array>=0.0.0",
]

[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pyd3js_contour"]

[tool.uv.sources]
pyd3js-array = { workspace = true }

