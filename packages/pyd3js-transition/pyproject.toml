[project]
name = "pyd3js-transition"
version = "0.0.0"
description = "Python port of d3-transition"
requires-python = ">=3.10"
readme = "README.md"
authors = [{ name = "pyd3 contributors" }]
dependencies = [
    "pyd3js-color>=0.0.0",
    "pyd3js-dispatch>=0.0.0",
    "pyd3js-ease>=0.0.0",
    "pyd3js-interpolate>=0.0.0",
    "pyd3js-timer>=0.0.0",
]

[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pyd3js_transition"]

[tool.uv.sources]
pyd3js-color = { workspace = true }
pyd3js-dispatch = { workspace = true }
pyd3js-ease = { workspace = true }
pyd3js-interpolate = { workspace = true }
pyd3js-timer = { workspace = true }

