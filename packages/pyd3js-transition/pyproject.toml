[project]
name = "pyd3js-transition"
version = "0.1.0"
description = "Python port of d3-transition"
requires-python = ">=3.10"
readme = "README.md"
authors = [{ name = "pyd3 contributors" }]
license = { file = "LICENSE" }
keywords = ["d3", "d3-transition", "animation", "transition"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: ISC License (ISCL)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
urls = { "Repository" = "https://github.com/eddiethedean/pyd3js", "Homepage" = "https://github.com/eddiethedean/pyd3js/tree/main/packages/pyd3js-transition" }
dependencies = [
    "pyd3js-color>=0.1.0",
    "pyd3js-dispatch>=0.1.0",
    "pyd3js-ease>=0.1.0",
    "pyd3js-interpolate>=0.1.0",
    "pyd3js-timer>=0.1.0",
]

[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[tool.hatch.build]
exclude = [
    ".env",
    "upstream/**/.git/**",
    "upstream/**/node_modules/**",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pyd3js_transition"]

[tool.pytest.ini_options]
testpaths = ["package_tests"]
pythonpath = ["package_tests"]
addopts = [
    "--cov=pyd3js_transition",
    "--cov-report=term-missing",
    "--cov-fail-under=100",
]

[tool.uv.sources]
pyd3js-color = { workspace = true }
pyd3js-dispatch = { workspace = true }
pyd3js-ease = { workspace = true }
pyd3js-interpolate = { workspace = true }
pyd3js-timer = { workspace = true }

