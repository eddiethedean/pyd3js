[project]
name = "pyd3js-delaunay"
version = "0.1.0"
description = "Python port of d3-delaunay (Delaunay triangulation and Voronoi diagrams)"
requires-python = ">=3.10"
readme = "README.md"
license = "ISC"
authors = [{ name = "pyd3 contributors" }]
keywords = ["d3", "delaunay", "voronoi", "triangulation", "computational-geometry"]
classifiers = [
    "License :: OSI Approved :: ISC License (ISCL)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "dylaunator>=0.1.0",
]
license-files = ["LICENSE"]

[project.urls]
Homepage = "https://github.com/eddiethedean/pyd3js"
Repository = "https://github.com/eddiethedean/pyd3js"
Upstream = "https://github.com/d3/d3-delaunay"

[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[tool.hatch.build]
sdist.include = [
    "README.md",
    "LICENSE",
    "docs/**",
    "src/**",
    "tests/**",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pyd3js_delaunay"]

[tool.uv.sources]
dylaunator = { workspace = true }
