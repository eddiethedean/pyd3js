[project]
name = "pyd3js-shape"
version = "0.0.0"
description = "Python port of d3-shape"
requires-python = ">=3.10"
readme = "README.md"
authors = [{ name = "pyd3 contributors" }]
dependencies = [
    "pyd3js-path>=0.0.0",
]

[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pyd3js_shape"]

[tool.uv.sources]
pyd3js-path = { workspace = true }

