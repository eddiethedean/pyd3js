[project]
name = "pyd3js-axis"
version = "0.1.0"
description = "Python port of d3-axis"
requires-python = ">=3.10"
readme = "README.md"
authors = [{ name = "pyd3 contributors" }]
dependencies = [
    # (no internal pyd3 deps)
]

[build-system]
requires = ["hatchling>=1.18.0"]
