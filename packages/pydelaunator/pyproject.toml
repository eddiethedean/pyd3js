[project]
name = "pydelaunator"
version = "0.1.0"
description = "Python port of mapbox/delaunator (Delaunay triangulation, half-edge mesh)"
requires-python = ">=3.10"
readme = "README.md"
license = "ISC"
authors = [{ name = "pyd3 contributors" }]
keywords = ["delaunay", "triangulation", "computational-geometry", "voronoi"]
classifiers = [
    "License :: OSI Approved :: ISC License (ISCL)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = [
    "pyrobust-predicates>=0.1.0",
]

[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pydelaunator"]

[tool.uv.sources]
pyrobust-predicates = { workspace = true }
