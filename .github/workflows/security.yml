name: Security

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "23 4 * * 1" # Mondays 04:23 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review (PRs)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        continue-on-error: true
      - name: Note about Dependency Graph
        if: failure()
        run: |
          echo "Dependency review requires GitHub Dependency Graph / Security Analysis to be enabled for this repo."
          echo "Enable it in Settings → Security & analysis (Dependency graph)."

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Analyze
        uses: github/codeql-action/analyze@v3

  python-deps:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Export locked runtime requirements
        run: uv export --locked --no-dev --format requirements-txt -o /tmp/requirements.txt

      - name: Run pip-audit (runtime deps)
        run: uv tool run pip-audit -r /tmp/requirements.txt

  oracle-npm-audit:
    name: Oracle npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/oracle/package-lock.json
      - name: Install oracle dependencies
        working-directory: tools/oracle
        run: npm ci
      - name: npm audit (omit dev)
        working-directory: tools/oracle
        run: npm audit --omit=dev

